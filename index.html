<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mopi Market - تسجيل الدخول</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a, #0b3d2e);
      color: #e6f2ef;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand img {
      width: 48px;
      height: 48px;
      border-radius: 8px;
    }
    .brand h1 {
      margin: 0;
      font-size: 20px;
      color: #fff;
    }
    .stats {
      display: flex;
      gap: 14px;
      font-size: 14px;
      color: #bfc7c2;
    }
    .stat {
      background: rgba(255,255,255,0.05);
      padding: 8px 12px;
      border-radius: 10px;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 40px;
    }
    .card {
      width: 900px;
      max-width: 100%;
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 28px;
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
    }
    .promo {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
    }
    .promo h2 {
      margin: 0;
      font-size: 22px;
      color: #fff;
    }
    .promo p {
      margin: 0;
      color: #bfc7c2;
      line-height: 1.6;
    }
    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }
    .feature {
      background: rgba(255,255,255,0.05);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      color: #eaf6ef;
    }
    .login {
      background: rgba(255,255,255,0.05);
      padding: 18px;
      border-radius: 12px;
    }
    .login h2 {
      margin: 0 0 8px 0;
      color: #fff;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #bfc7c2;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #eaf6ef;
      font-size: 15px;
    }
    input:focus {
      outline: none;
      border-color: #00b894;
      box-shadow: 0 6px 18px rgba(0,184,148,0.3);
    }
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #00b894;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
    }
    .btn:hover {
      background: #00966f;
    }
    .error { color: #ff6b6b; font-size: 13px; margin-top: 6px; }
    .success { color: #2ecc71; font-size: 13px; margin-top: 6px; }
    @media (max-width:900px){
      .card{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <img src="logo1" alt="شعار Mopi Market">
      <h1>Mopi Market</h1>
    </div>
    <div class="stats">
      <div class="stat">⭐ 4.0</div>
      <div class="stat">المرتبة 1 من 10</div>
      <div class="stat">+40,000 مستخدم</div>
    </div>
  </div>

  <main class="wrap">
    <section class="card">
      <aside class="promo">
        <div>
          <h2>أفضل تجربة تسوق</h2>
          <p>استمتع بأسعار متميزة، جودة عالية، وخدمة عملاء على مدار الساعة.</p>
          <div class="features">
            <div class="feature">💰 أسعار منافسة</div>
            <div class="feature">📦 منتجات متنوعة</div>
            <div class="feature">⚡ سرعة التوصيل</div>
            <div class="feature">🔒 أمان وحماية</div>
          </div>
        </div>
      </aside>

      <section class="login">
        <h2>تسجيل الدخول</h2>
        <form id="loginForm" onsubmit="return handleLogin(event)">
          <div class="form-group">
            <label for="username">اسم المستخدم</label>
            <input id="username" type="text" required>
          </div>
          <div class="form-group">
            <label for="password">كلمة المرور</label>
            <input id="password" type="password" required>
          </div>
          <button class="btn" type="submit">تسجيل الدخول</button>
          <div id="message"></div>
        </form>
      </section>
    </section>
  </main>

  <script>
    async function hashPassword(password){
      const enc = new TextEncoder();
      const data = enc.encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
    }

    async function openDB(){
      return new Promise((resolve,reject)=>{
        const req = indexedDB.open('mopiDB',1);
        req.onupgradeneeded = e=>{
          const db = e.target.result;
          if(!db.objectStoreNames.contains('users')){
            db.createObjectStore('users',{keyPath:'username'});
          }
        };
        req.onsuccess=()=>resolve(req.result);
        req.onerror=()=>reject(req.error);
      });
    }

    async function getUser(username){
      const db = await openDB();
      return new Promise((resolve,reject)=>{
        const tx = db.transaction('users','readonly');
        const store = tx.objectStore('users');
        const r = store.get(username);
        r.onsuccess=()=>resolve(r.result);
        r.onerror=()=>reject(r.error);
      });
    }

    async function handleLogin(e){
      e.preventDefault();
      const username=document.getElementById('username').value.trim();
      const pwd=document.getElementById('password').value;
      const msg=document.getElementById('message');
      msg.textContent='';
      if(!username||!pwd){msg.textContent='يرجى إدخال البيانات';msg.className='error';return false;}
      try{
        const user=await getUser(username);
        if(!user){msg.textContent='المستخدم غير موجود';msg.className='error';return false;}
        const hashed=await hashPassword(pwd);
        if(hashed!==user.passwordHash){msg.textContent='كلمة المرور غير صحيحة';msg.className='error';return false;}
